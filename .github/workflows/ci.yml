name: Java CI/CD Pipeline

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the code from the repository
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Step 2: Set up JDK 17 for the Java build
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 3: Build the application (compile, package, and run tests)
      - name: Build Application
        run: mvn clean package

      # Step 4: SonarQube (or SonarCloud) code quality analysis
      - name: SonarQube Analysis
        env:
          SONAR_TOKEN: ${{ secrets.sonarQubeToken }}  # Ensure this secret is set in GitHub
        run: mvn sonar:sonar \
          -Dsonar.projectKey=myapp \
          -Dsonar.organization=binod0506devops-pixel \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.login=$SONAR_TOKEN

      # Step 5: Build Docker image for the application
      - name: Build Docker Image
        run: docker build -t myapp:${{ github.sha }} .

      # Step 6: Log in to Docker Hub (using secrets for credentials)
      - name: Docker Hub Login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # Step 7: Push Docker image to Docker Hub
      - name: Push Docker Image
        run: docker push myapp:${{ github.sha }}

      # Step 8: Complete job success
      - name: Complete Job
        run: echo "CI/CD Pipeline completed successfully"